version: '3.8'

services:
  # --- PostgreSQL Database ---
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: eduai
      POSTGRES_PASSWORD: eduai_secret
      POSTGRES_DB: eduai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U eduai" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- FastAPI Backend (serves frontend SPA) ---
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://eduai:eduai_secret@db:5432/eduai
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-real-secret}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"

      HOST: "0.0.0.0"
      PORT: "8000"
      DEBUG: "false"
    env_file:
      - backend/.env

volumes:
  pgdata:
