# ============================================================
# Ed-AI — Render Blueprint
# Connect this repo to Render and it auto-deploys from this file.
# https://render.com/docs/blueprint-spec
# ============================================================

services:
  # --- FastAPI Backend + Frontend SPA ---
  - type: web
    name: eduai-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      cd backend && pip install -r requirements.txt &&
      cd ../frontend && npm ci && npm run build &&
      mkdir -p ../backend/app/static/dist &&
      cp -r dist/* ../backend/app/static/dist/
    startCommand: cd backend && pip install gunicorn && alembic upgrade head && gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false  # User must set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: eduai-db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: eduai-db
    plan: free
    databaseName: eduai
    user: eduai
    region: oregon
