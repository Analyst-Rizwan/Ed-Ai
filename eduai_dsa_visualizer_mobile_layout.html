<script>
const state = {
  isFullscreen: false,
  isWheelOpen: false,
  isRunning: false,
  isPaused: false,
  speed: 'normal',
  bars: [],
  animFrame: null,
  compares: 0,
  swaps: 0,
  animInterval: null,
  sortSteps: [],
  stepIndex: 0,
};

const N = 16;
const SPEED_MS = { slow: 300, normal: 100, fast: 20 };

function genBars() {
  state.bars = Array.from({length: N}, () => Math.floor(Math.random() * 80) + 10);
  state.compares = 0;
  state.swaps = 0;
  state.sortSteps = [];
  state.stepIndex = 0;
}

function buildBubbleSortSteps(arr) {
  const a = [...arr], steps = [];
  for (let i = 0; i < a.length; i++) {
    for (let j = 0; j < a.length - i - 1; j++) {
      steps.push({ type: 'compare', i: j, j: j+1, arr: [...a] });
      if (a[j] > a[j+1]) {
        [a[j], a[j+1]] = [a[j+1], a[j]];
        steps.push({ type: 'swap', i: j, j: j+1, arr: [...a] });
      }
    }
  }
  steps.push({ type: 'done', arr: [...a] });
  return steps;
}

function drawBars(canvas, bars, highlightI, highlightJ, type) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const bw = W / bars.length;
  const maxV = 100;
  bars.forEach((v, i) => {
    const bh = (v / maxV) * (H - 20);
    const x = i * bw + 1;
    const y = H - bh;
    if (i === highlightI || i === highlightJ) {
      ctx.fillStyle = type === 'swap' ? '#cd7b3a' : '#7C3AED';
    } else {
      ctx.fillStyle = '#2a3060';
    }
    ctx.beginPath();
    ctx.roundRect(x, y, bw - 2, bh, 3);
    ctx.fill();
    if (bw > 14) {
      ctx.fillStyle = '#888';
      ctx.font = '9px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(v, x + (bw-2)/2, y - 3);
    }
  });
}

function resizeCanvases() {
  const vc = document.getElementById('vizContainer');
  const nc = document.getElementById('vizCanvas');
  nc.width = vc.clientWidth;
  nc.height = vc.clientHeight - 24;

  const fs = document.getElementById('fsViz');
  const fc = document.getElementById('fsCanvas');
  fc.width = fs.clientWidth;
  fc.height = fs.clientHeight - 24;
}

function renderNormal(bars, hi, hj, type) {
  drawBars(document.getElementById('vizCanvas'), bars, hi, hj, type);
}

function renderFS(bars, hi, hj, type) {
  drawBars(document.getElementById('fsCanvas'), bars, hi, hj, type);
}

function renderBoth(bars, hi, hj, type) {
  renderNormal(bars, hi, hj, type);
  renderFS(bars, hi, hj, type);
}

function updateStats(c, s) {
  document.getElementById('statCompares').textContent = `↕ ${c} compares`;
  document.getElementById('statSwaps').textContent = `: ${s} swaps`;
  document.getElementById('fsCompares').textContent = `↕ ${c} compares`;
  document.getElementById('fsSwaps').textContent = `: ${s} swaps`;
}

function stopAnim() {
  if (state.animInterval) { clearInterval(state.animInterval); state.animInterval = null; }
  state.isRunning = false;
  state.isPaused = false;
}

function runSort() {
  stopAnim();
  state.sortSteps = buildBubbleSortSteps(state.bars);
  state.stepIndex = 0;
  state.compares = 0;
  state.swaps = 0;
  state.isRunning = true;
  state.isPaused = false;
  tick();
}

function tick() {
  if (!state.isRunning || state.isPaused) return;
  if (state.stepIndex >= state.sortSteps.length) { state.isRunning = false; return; }
  const step = state.sortSteps[state.stepIndex++];
  if (step.type === 'compare') state.compares++;
  if (step.type === 'swap') state.swaps++;
  renderBoth(step.arr, step.i, step.j, step.type);
  updateStats(state.compares, state.swaps);
  const ms = SPEED_MS[state.speed];
  if (state.isRunning) state.animInterval = setTimeout(tick, ms);
}

// FAB WHEEL SETUP
const wheelDefs = [
  { id: 'exit',   label: 'Exit', cls: 'wc-exit',         angle: 270, radius: 68,
    icon: `<path d="M6 3H3a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h3M9 7h6M12 4l3 3-3 3" stroke="#e06080" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>` },
  { id: 'reset',  label: 'New',  cls: 'wc-reset',        angle: 225, radius: 76,
    icon: `<path d="M4 7a6 6 0 1 1 1 4.5M4 7V3M4 7H8" stroke="#F59E0B" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>` },
  { id: 'pause',  label: 'Pause', cls: 'wc-pause',       angle: 180, radius: 76,
    icon: `<rect x="4" y="3" width="3" height="10" rx="1" fill="#60c060"/><rect x="9" y="3" width="3" height="10" rx="1" fill="#60c060"/>` },
  { id: 'fast',   label: 'Fast', cls: 'wc-speed-fast',   angle: 140, radius: 72,
    icon: `<path d="M4 8h8M9 4l4 4-4 4" stroke="#a080e0" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 8h1" stroke="#a080e0" stroke-width="1.4" stroke-linecap="round"/>` },
  { id: 'normal', label: 'Normal', cls: 'wc-speed-normal', angle: 105, radius: 68,
    icon: `<path d="M3 8h10M10 5l3 3-3 3" stroke="#60a0d0" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>` },
  { id: 'slow',   label: 'Slow', cls: 'wc-speed-slow',   angle: 75,  radius: 72,
    icon: `<path d="M3 8h8M8 5l3 3-3 3" stroke="#888" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>` },
];

function buildWheel() {
  const container = document.getElementById('wheelItems');
  container.innerHTML = '';
  wheelDefs.forEach(def => {
    const el = document.createElement('div');
    el.className = 'wheel-item';
    el.dataset.id = def.id;
    const rad = (def.angle * Math.PI) / 180;
    const x = -Math.cos(rad) * def.radius - 20;
    const y = -Math.sin(rad) * def.radius - 20;
    el.style.left = x + 'px';
    el.style.bottom = (24 + (-y - 40)) + 'px';
    el.innerHTML = `
      <div class="wheel-circle ${def.cls}" id="wc-${def.id}">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">${def.icon}</svg>
      </div>
      <span class="wheel-label">${def.label}</span>
    `;
    el.style.left = '';
    el.style.right = '';
    el.style.bottom = '';
    el.style.position = 'absolute';
    const rx = Math.cos(rad) * def.radius;
    const ry = Math.sin(rad) * def.radius;
    el.style.right = (rx - 4) + 'px';
    el.style.bottom = (ry + 24) + 'px';
    container.appendChild(el);
  });
}

function openWheel() {
  state.isWheelOpen = true;
  document.getElementById('fabBtn').classList.add('open');
  document.getElementById('wheelBackdrop').classList.add('active');
  document.querySelectorAll('.wheel-item').forEach((el, i) => {
    setTimeout(() => el.classList.add('visible'), i * 30);
  });
}

function closeWheel() {
  state.isWheelOpen = false;
  document.getElementById('fabBtn').classList.remove('open');
  document.getElementById('wheelBackdrop').classList.remove('active');
  document.querySelectorAll('.wheel-item').forEach(el => el.classList.remove('visible'));
}

function enterFullscreen() {
  state.isFullscreen = true;
  document.getElementById('fullscreenOverlay').classList.add('active');
  setTimeout(() => { resizeCanvases(); renderBoth(state.bars, -1, -1, ''); }, 50);
}

function exitFullscreen() {
  state.isFullscreen = false;
  document.getElementById('fullscreenOverlay').classList.remove('active');
  setTimeout(() => { resizeCanvases(); renderNormal(state.bars, -1, -1, ''); }, 50);
}

function updatePauseBtn() {
  const el = document.getElementById('wc-pause');
  if (!el) return;
  const svg = el.querySelector('svg');
  if (state.isPaused) {
    svg.innerHTML = `<path d="M5 3l8 5-8 5V3z" fill="#60c060"/>`;
    el.parentElement.querySelector('.wheel-label').textContent = 'Resume';
  } else {
    svg.innerHTML = `<rect x="4" y="3" width="3" height="10" rx="1" fill="#60c060"/><rect x="9" y="3" width="3" height="10" rx="1" fill="#60c060"/>`;
    el.parentElement.querySelector('.wheel-label').textContent = 'Pause';
  }
}

function setSpeed(s) {
  state.speed = s;
  ['slow','normal','fast'].forEach(sp => {
    const c = document.getElementById(`wc-${sp}`);
    if (c) c.classList.toggle('wc-active', sp === s);
  });
}

// EVENT WIRING
document.getElementById('fabBtn').addEventListener('click', () => {
  state.isWheelOpen ? closeWheel() : openWheel();
});

document.getElementById('wheelBackdrop').addEventListener('click', closeWheel);

document.getElementById('wheelItems').addEventListener('click', e => {
  const item = e.target.closest('.wheel-item');
  if (!item) return;
  const id = item.dataset.id;

  if (id === 'exit') {
    closeWheel();
    exitFullscreen();
    stopAnim();
  } else if (id === 'reset') {
    genBars();
    renderBoth(state.bars, -1, -1, '');
    updateStats(0, 0);
    stopAnim();
    closeWheel();
  } else if (id === 'pause') {
    if (state.isRunning) {
      state.isPaused = !state.isPaused;
      if (!state.isPaused) tick();
      updatePauseBtn();
    }
    closeWheel();
  } else if (['slow','normal','fast'].includes(id)) {
    setSpeed(id);
    closeWheel();
  }
});

document.getElementById('expandBtn').addEventListener('click', enterFullscreen);
document.getElementById('vizContainer').addEventListener('click', e => {
  if (e.target === document.getElementById('expandBtn') || document.getElementById('expandBtn').contains(e.target)) return;
  const hint = document.getElementById('tapHint');
  hint.classList.add('show');
  setTimeout(() => hint.classList.remove('show'), 1200);
  enterFullscreen();
});

document.getElementById('runBtn').addEventListener('click', () => {
  if (state.bars.length === 0) genBars();
  runSort();
  enterFullscreen();
});

document.getElementById('newBtn').addEventListener('click', () => {
  genBars();
  renderBoth(state.bars, -1, -1, '');
  updateStats(0, 0);
  stopAnim();
});

// TABS
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
  });
});

// INIT
genBars();
buildWheel();
setSpeed('normal');

setTimeout(() => {
  resizeCanvases();
  renderNormal(state.bars, -1, -1, '');
}, 100);

window.addEventListener('resize', () => {
  resizeCanvases();
  renderBoth(state.bars, -1, -1, '');
});
</script>
